apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: happy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/gmtreacy/gop-gitops.git
    targetRevision: HEAD
    path: helm/happy
  destination:
    server: https://kubernetes.default.svc
    namespace: happy
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
