apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
   name: argocd
   namespace: argocd
spec:
  project: default
  source:
     repoURL: https://github.com/gmtreacy/gop-gitops.git
     targetRevision: main
     path: argo-cd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
     syncOptions:
     - CreateNamespace=true
     automated:
       selfHeal: true
       prune: true
