apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
   name: gop-kust
   namespace: argocd
spec:
  project: default
  source:
     repoURL: https://github.com/gmtreacy/gop-gitops.git
     targetRevision: HEAD
     path: kust/overlays
  destination:
    server: https://kubernetes.default.svc
    namespace: gop

  syncPolicy:
     syncOptions:
     - CreateNamespace=true
     automated:
       selfHeal: true
       prune: true
