apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

namespace: default

patches:
  - target:
      kind: Deployment
      name: gop-code-kust
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: gop-code-kust
      spec:
        replicas: 6
